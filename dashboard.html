<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dio Design — Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg-panel: #0d1018;
    --bg-card: #0f1520;
    --bg-card-hover: #141e2e;
    --border: #1a2535;
    --accent: #88ccff;
    --text: #c8d8e8;
    --text-dim: #6a7f96;
    --green: #44ff88;
    --red: #ff4455;
    --badge-voice: #2a4a7f;
    --badge-voice-text: #88ccff;
    --badge-response: #1a3a2a;
    --badge-response-text: #44ff88;
    --badge-connect: #2a3a1a;
    --badge-connect-text: #aadd66;
    --badge-error: #3a1a1a;
    --badge-error-text: #ff6677;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #1e3050; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #2a4070; }

  /* Top bar */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 48px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #topbar-title {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  #status-row {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.connected { background: var(--green); }

  /* Main layout */
  #layout {
    display: flex;
    height: calc(100vh - 48px);
    overflow: hidden;
  }

  /* Left panel */
  #left-panel {
    width: 35%;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  /* Right panel */
  #right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Panel headers */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 0.5rem;
  }

  .panel-title {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  /* Buttons */
  .btn {
    border: 1px solid rgba(136, 204, 255, 0.3);
    background: rgba(136, 204, 255, 0.08);
    color: var(--accent);
    border-radius: 4px;
    padding: 0.3rem 0.8rem;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }

  .btn:hover {
    background: rgba(136, 204, 255, 0.16);
    border-color: rgba(136, 204, 255, 0.55);
  }

  .btn:active { opacity: 0.8; }

  /* Hidden file input */
  #load-session-input { display: none; }

  /* Scrollable areas */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  /* Version entries */
  .version-entry {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.8rem;
  }

  .version-entry:hover { background: var(--bg-card-hover); }
  .version-entry.selected { border-color: var(--accent); }

  .version-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.35rem;
    gap: 0.5rem;
  }

  .version-num {
    color: var(--accent);
    font-weight: 700;
    font-size: 0.82rem;
  }

  .version-ts {
    color: var(--text-dim);
    font-size: 0.7rem;
    white-space: nowrap;
  }

  .version-cmd {
    color: var(--text);
    font-size: 0.76rem;
    line-height: 1.4;
    word-break: break-word;
    margin-bottom: 0.5rem;
  }

  .version-footer {
    display: flex;
    justify-content: flex-end;
  }

  .btn-export {
    font-size: 0.65rem;
    padding: 0.2rem 0.55rem;
  }

  /* Empty state */
  .empty-state {
    color: var(--text-dim);
    font-size: 0.78rem;
    text-align: center;
    padding: 2rem 1rem;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  /* Live feed entries */
  .feed-entry {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    font-size: 0.8rem;
    line-height: 1.45;
  }

  .feed-ts {
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.68rem;
    white-space: nowrap;
    padding-top: 0.05rem;
    flex-shrink: 0;
  }

  .feed-badge {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 0.05rem;
  }

  .badge-VOICE    { background: var(--badge-voice);    color: var(--badge-voice-text); }
  .badge-RESPONSE { background: var(--badge-response); color: var(--badge-response-text); }
  .badge-CONNECT  { background: var(--badge-connect);  color: var(--badge-connect-text); }
  .badge-ERROR    { background: var(--badge-error);    color: var(--badge-error-text); }
  .badge-INFO     { background: #1e2535; color: #8899aa; }

  .feed-msg {
    color: var(--text);
    word-break: break-word;
    flex: 1;
  }
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-title">Dio Design — Dashboard</span>
  <div id="status-row">
    <div class="status-item">
      <div class="status-dot" id="dot-ar"></div>
      <span>AR Viewer</span>
    </div>
    <div class="status-item">
      <div class="status-dot" id="dot-controller"></div>
      <span>Controller</span>
    </div>
  </div>
</div>

<div id="layout">

  <!-- Left Panel: Version Timeline -->
  <div id="left-panel">
    <div class="panel-header">
      <span class="panel-title">Scene Versions</span>
      <div class="header-actions">
        <button class="btn" id="btn-save">Save Session</button>
        <button class="btn" id="btn-load-trigger">Load Session</button>
        <input type="file" id="load-session-input" accept=".json">
      </div>
    </div>
    <div class="scroll-area" id="version-list">
      <div class="empty-state">No versions yet.<br>Speak a command to begin.</div>
    </div>
  </div>

  <!-- Right Panel: Live Activity Feed -->
  <div id="right-panel">
    <div class="panel-header">
      <span class="panel-title">Live Activity</span>
    </div>
    <div class="scroll-area" id="feed-list">
      <div class="empty-state">Waiting for activity...</div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ── State ────────────────────────────────────────────────────────────────
  let ws = null;
  let selectedVersionId = null;
  let reconnectTimer = null;
  const MAX_FEED_ENTRIES = 200;

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const dotAR         = document.getElementById('dot-ar');
  const dotCtrl       = document.getElementById('dot-controller');
  const versionList   = document.getElementById('version-list');
  const feedList      = document.getElementById('feed-list');
  const btnSave       = document.getElementById('btn-save');
  const btnLoadTrigger= document.getElementById('btn-load-trigger');
  const fileInput     = document.getElementById('load-session-input');

  // ── Helpers ───────────────────────────────────────────────────────────────
  function formatTime(ts) {
    const d = ts ? new Date(ts) : new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function truncate(str, max) {
    if (!str) return '';
    return str.length > max ? str.slice(0, max) + '…' : str;
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  // ── Connection status dots ────────────────────────────────────────────────
  function setDot(dot, connected) {
    if (connected) {
      dot.classList.add('connected');
    } else {
      dot.classList.remove('connected');
    }
  }

  // ── Version timeline ──────────────────────────────────────────────────────
  function buildVersionList(versions) {
    if (!versions || versions.length === 0) {
      versionList.innerHTML = '<div class="empty-state">No versions yet.<br>Speak a command to begin.</div>';
      return;
    }

    // Newest first
    const sorted = [...versions].reverse();

    versionList.innerHTML = '';
    sorted.forEach(v => {
      const entry = document.createElement('div');
      entry.className = 'version-entry' + (v.id === selectedVersionId ? ' selected' : '');
      entry.dataset.versionId = v.id;

      const ts = formatTime(v.timestamp);
      const cmd = truncate(v.command || '(no command)', 60);

      entry.innerHTML = `
        <div class="version-header">
          <span class="version-num">v${v.version}</span>
          <span class="version-ts">${ts}</span>
        </div>
        <div class="version-cmd">${escapeHtml(cmd)}</div>
        <div class="version-footer">
          <button class="btn btn-export" data-version-id="${escapeAttr(v.id)}">Export GLB</button>
        </div>
      `;

      // Click to load version (on the card, not the button)
      entry.addEventListener('click', function (e) {
        if (e.target.closest('.btn-export')) return;
        selectedVersionId = v.id;
        document.querySelectorAll('.version-entry').forEach(el => el.classList.remove('selected'));
        entry.classList.add('selected');
        send({ type: 'load_version', version_id: v.id });
      });

      // Export button
      entry.querySelector('.btn-export').addEventListener('click', function (e) {
        e.stopPropagation();
        send({ type: 'trigger_export', version_id: v.id });
        addFeedEntry('INFO', `Export triggered for v${v.version}`);
      });

      versionList.appendChild(entry);
    });
  }

  // ── Live feed ─────────────────────────────────────────────────────────────
  function addFeedEntry(type, message, ts) {
    // Remove empty state if present
    const empty = feedList.querySelector('.empty-state');
    if (empty) empty.remove();

    const entry = document.createElement('div');
    entry.className = 'feed-entry';
    entry.innerHTML = `
      <span class="feed-ts">${formatTime(ts)}</span>
      <span class="feed-badge badge-${type}">${escapeHtml(type)}</span>
      <span class="feed-msg">${escapeHtml(message)}</span>
    `;

    // Newest on top
    feedList.insertBefore(entry, feedList.firstChild);

    // Trim old entries
    const entries = feedList.querySelectorAll('.feed-entry');
    if (entries.length > MAX_FEED_ENTRIES) {
      entries[entries.length - 1].remove();
    }
  }

  // ── HTML escaping ─────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escapeAttr(str) {
    return String(str).replace(/"/g, '&quot;');
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/ws/dashboard`;

    ws = new WebSocket(url);

    ws.addEventListener('open', function () {
      addFeedEntry('CONNECT', 'Connected to hub');
      send({ type: 'request_state' });
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    });

    ws.addEventListener('close', function () {
      addFeedEntry('ERROR', 'Disconnected from hub — reconnecting…');
      ws = null;
      reconnectTimer = setTimeout(connect, 3000);
    });

    ws.addEventListener('error', function () {
      // close event will follow; avoid duplicate messages
    });

    ws.addEventListener('message', function (evt) {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }
      handleMessage(msg);
    });
  }

  function handleMessage(msg) {
    switch (msg.type) {

      case 'versions':
        buildVersionList(msg.data || []);
        break;

      case 'command_log': {
        const ts = msg.timestamp;
        if (msg.command) addFeedEntry('VOICE', msg.command, ts);
        if (msg.response) addFeedEntry('RESPONSE', msg.response, ts);
        break;
      }

      case 'connection_status':
        setDot(dotAR,   !!msg.ar_connected);
        setDot(dotCtrl, !!msg.controller_connected);
        break;

      default:
        // Ignore unknown message types silently
        break;
    }
  }

  // ── Button handlers ───────────────────────────────────────────────────────
  btnSave.addEventListener('click', function () {
    send({ type: 'save_session' });
    addFeedEntry('INFO', 'Save session requested');
  });

  btnLoadTrigger.addEventListener('click', function () {
    fileInput.click();
  });

  fileInput.addEventListener('change', function () {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      let parsed;
      try { parsed = JSON.parse(e.target.result); } catch {
        addFeedEntry('ERROR', 'Failed to parse session file — invalid JSON');
        return;
      }
      send({ type: 'load_session', data: parsed });
      addFeedEntry('INFO', `Session loaded from file: ${file.name}`);
    };
    reader.readAsText(file);
    // Reset so same file can be loaded again
    fileInput.value = '';
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  connect();

}());
</script>
</body>
</html>
