<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dio Design</title>
<script type="importmap">{"imports":{
  "three":                      "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
  "three/addons/":              "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
}}</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #070b10;
  color: #d0dde8;
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 13px;
}

#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Topbar ── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 44px;
  padding: 0 14px;
  flex-shrink: 0;
  background: #060910;
  border-bottom: 1px solid #0f1820;
  z-index: 10;
}

#topbar-left { display: flex; align-items: center; }

#logo {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  background: linear-gradient(90deg, #88ccff, #cc88ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  user-select: none;
}

#topbar-center { display: flex; align-items: center; gap: 4px; }

#topbar-right { display: flex; align-items: center; gap: 14px; }

.tool-btn {
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  border: 1px solid #1a2535;
  color: #7090a0;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  font-family: system-ui, -apple-system, sans-serif;
  white-space: nowrap;
}
.tool-btn:hover { background: #0f1820; color: #88ccff; border-color: #2a3a50; }
.tool-btn.active { background: rgba(136,204,255,0.1); color: #88ccff; border-color: rgba(136,204,255,0.35); }

.tool-sep { width: 1px; height: 20px; background: #1a2535; margin: 0 4px; flex-shrink: 0; }

.status-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: #4a6070;
  letter-spacing: 0.05em;
}
.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #ff5252;
  box-shadow: 0 0 5px #ff525260;
  transition: background 0.4s, box-shadow 0.4s;
  flex-shrink: 0;
}
.dot.on { background: #3ddc84; box-shadow: 0 0 6px #3ddc8460; }

/* ── Main area ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 240px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: #070c12;
  border-right: 1px solid #0f1820;
  overflow: hidden;
}

#sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 8px;
  border-bottom: 1px solid #0f1820;
  flex-shrink: 0;
}
#sidebar-header > span {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #4a6070;
}
#version-count { color: #2a4050; }

#version-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#version-list::-webkit-scrollbar { width: 3px; }
#version-list::-webkit-scrollbar-track { background: transparent; }
#version-list::-webkit-scrollbar-thumb { background: #1a2535; border-radius: 2px; }

.version-card {
  border: 1px solid #0f1820;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: #080e16;
  flex-shrink: 0;
}
.version-card:hover { border-color: #1e3048; background: #0a1018; }
.version-card.selected { border-color: rgba(136,204,255,0.4); background: #0c1622; }

.version-thumb {
  width: 100%;
  height: 64px;
  overflow: hidden;
  background: #0a0f1a;
  display: flex;
  align-items: center;
  justify-content: center;
}
.version-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.version-thumb .no-thumb { color: #1a2535; font-size: 22px; }

.version-meta { padding: 6px 8px 4px; }
.version-top {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 3px;
}
.version-num {
  font-size: 10px;
  font-weight: 600;
  color: #4a7090;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.version-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #3ddc84;
  flex-shrink: 0;
}
.version-dot.fail { background: #ff5252; }
.version-age {
  font-size: 9px;
  color: #2a4050;
  margin-left: auto;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.version-cmd {
  font-size: 10px;
  color: #6080a0;
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.version-actions { padding: 0 8px 6px; }
.version-export-btn {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 3px;
  cursor: pointer;
  background: transparent;
  border: 1px solid #1a2535;
  color: #4a6070;
  transition: border-color 0.15s, color 0.15s;
  width: 100%;
  font-family: system-ui, -apple-system, sans-serif;
}
.version-export-btn:hover { border-color: rgba(136,204,255,0.3); color: #88ccff; }

.version-empty {
  padding: 24px 12px;
  color: #2a4050;
  font-size: 11px;
  text-align: center;
  line-height: 1.7;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

#sidebar-footer {
  padding: 8px;
  border-top: 1px solid #0f1820;
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.btn {
  flex: 1;
  padding: 6px 0;
  font-size: 11px;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  border: 1px solid #1a2535;
  color: #5a7080;
  transition: border-color 0.15s, color 0.15s;
  font-family: system-ui, -apple-system, sans-serif;
}
.btn:hover { border-color: rgba(136,204,255,0.3); color: #88ccff; }

/* ── Workspace ── */
#workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#viewport-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0a0f1a;
}
#preview-canvas { display: block; width: 100%; height: 100%; }

#viewport-overlay {
  position: absolute;
  bottom: 10px;
  right: 12px;
  pointer-events: none;
}
#object-info {
  font-size: 10px;
  color: #2a4050;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  text-align: right;
  line-height: 1.6;
}

/* ── Log strip ── */
#log-strip {
  flex-shrink: 0;
  height: 110px;
  background: #060a0f;
  border-top: 1px solid #0f1820;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#log-header {
  padding: 4px 12px;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #2a4050;
  border-bottom: 1px solid #0a1018;
  flex-shrink: 0;
}
#log-list {
  flex: 1;
  overflow-y: auto;
  padding: 2px 0;
}
#log-list::-webkit-scrollbar { width: 3px; }
#log-list::-webkit-scrollbar-track { background: transparent; }
#log-list::-webkit-scrollbar-thumb { background: #1a2535; border-radius: 2px; }

.log-entry {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 2px 12px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 10px;
  line-height: 1.5;
}
.log-entry:hover { background: #0a0f18; }
.log-ts { color: #2a4050; flex-shrink: 0; }
.log-badge {
  font-size: 8px;
  padding: 1px 4px;
  border-radius: 2px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.log-badge.voice    { background: rgba(136,204,255,0.12); color: #88ccff; }
.log-badge.response { background: rgba(61,220,132,0.10);  color: #3ddc84; }
.log-badge.error    { background: rgba(255,82,82,0.10);   color: #ff5252; }
.log-badge.info     { background: rgba(90,112,128,0.10);  color: #5a7080; }
.log-msg { color: #6080a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
</style>
</head>
<body>

<div id="app">
  <header id="topbar">
    <div id="topbar-left">
      <span id="logo">&#9689; Dio Design</span>
    </div>
    <div id="topbar-center">
      <button class="tool-btn" id="btn-wireframe" title="Wireframe (W)">&#x2B21; Wire</button>
      <button class="tool-btn" id="btn-grid" title="Toggle grid (G)">&#x229E; Grid</button>
      <button class="tool-btn" id="btn-fit" title="Fit to scene (F)">&#x2316; Fit</button>
      <button class="tool-btn" id="btn-reset" title="Reset camera (R)">&#x21BA; Reset</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="btn-export" title="Export current version as GLB">&#x2193; Export GLB</button>
    </div>
    <div id="topbar-right">
      <span class="status-item"><span class="dot" id="dot-ar"></span>AR</span>
      <span class="status-item"><span class="dot" id="dot-ctrl"></span>CTRL</span>
    </div>
  </header>

  <div id="main">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span>History</span>
        <span id="version-count">0 versions</span>
      </div>
      <div id="version-list">
        <div class="version-empty">No versions yet.<br>Speak a command in AR<br>to create one.</div>
      </div>
      <div id="sidebar-footer">
        <button class="btn" id="btn-save">Save Session</button>
        <button class="btn" id="btn-load-trigger">Load Session</button>
        <input type="file" id="file-input" accept=".json" style="display:none">
      </div>
    </aside>

    <div id="workspace">
      <div id="viewport-container">
        <canvas id="preview-canvas"></canvas>
        <div id="viewport-overlay">
          <div id="object-info"></div>
        </div>
      </div>
      <div id="log-strip">
        <div id="log-header">Activity</div>
        <div id="log-list"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// ── State ──────────────────────────────────────────────────────────────────────
let ws = null;
let versionsCache = [];
let selectedVersionId = null;
const sceneDataCache = new Map();   // version_id → scene_data
const thumbnails = new Map();       // version_id → dataURL
let wireframeMode = false;
let gridVisible = true;

// ── Three.js setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('preview-canvas');
const previewRenderer = new THREE.WebGLRenderer({ antialias: true, canvas, preserveDrawingBuffer: true });
previewRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
previewRenderer.shadowMap.enabled = true;
previewRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
previewRenderer.setClearColor(0x0a0f1a);

const previewScene = new THREE.Scene();
const previewCam = new THREE.PerspectiveCamera(45, 1, 0.001, 100);
previewCam.position.set(0.4, 0.35, 0.55);

const controls = new OrbitControls(previewCam, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.target.set(0, 0.05, 0);
controls.minDistance = 0.02;
controls.maxDistance = 10;
controls.update();

// Lighting
previewScene.add(new THREE.AmbientLight(0xffffff, 0.45));
const keyLight = new THREE.DirectionalLight(0xfff5ee, 1.1);
keyLight.position.set(-2, 4, 3);
keyLight.castShadow = true;
keyLight.shadow.mapSize.setScalar(1024);
previewScene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xddeeff, 0.35);
fillLight.position.set(3, 1, -2);
previewScene.add(fillLight);
previewScene.add(new THREE.HemisphereLight(0x99bbdd, 0x553322, 0.3));

// Ground grid
const grid = new THREE.GridHelper(1.2, 24, 0x1a2535, 0x0f1820);
previewScene.add(grid);

// Shadow receiver floor
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.ShadowMaterial({ opacity: 0.2 })
);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.receiveShadow = true;
previewScene.add(floorMesh);

// Resize observer
const ro = new ResizeObserver(() => {
  const { width, height } = canvas.getBoundingClientRect();
  if (width === 0 || height === 0) return;
  previewRenderer.setSize(width, height, false);
  previewCam.aspect = width / height;
  previewCam.updateProjectionMatrix();
});
ro.observe(canvas);

// Animate
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  previewRenderer.render(previewScene, previewCam);
}
animate();

// ── Geometry reconstruction ────────────────────────────────────────────────────
function buildGeometry(od) {
  const p = od.geometryParams || {};
  const type = (od.geometry || 'box').toLowerCase()
    .replace('geometry', '').trim();
  switch (type) {
    case 'box':       return new THREE.BoxGeometry(p.width||1, p.height||1, p.depth||1);
    case 'sphere':    return new THREE.SphereGeometry(p.radius||0.5, 32, 32);
    case 'cylinder':  return new THREE.CylinderGeometry(p.radiusTop||0.5, p.radiusBottom||0.5, p.height||1, 32);
    case 'cone':      return new THREE.ConeGeometry(p.radius||0.5, p.height||1, 32);
    case 'torus':     return new THREE.TorusGeometry(p.radius||0.5, p.tube||0.2, 16, 64);
    case 'plane':     return new THREE.PlaneGeometry(p.width||1, p.height||1);
    default:          return new THREE.BoxGeometry(p.width||0.1, p.height||0.1, p.depth||0.1);
  }
}

function buildMesh(od) {
  const mp = od.material || {};
  const mat = new THREE.MeshStandardMaterial({
    color:             mp.color             != null ? mp.color             : 0x88aacc,
    metalness:         mp.metalness         != null ? mp.metalness         : 0,
    roughness:         mp.roughness         != null ? mp.roughness         : 0.5,
    emissive:          mp.emissive          != null ? mp.emissive          : 0x000000,
    emissiveIntensity: mp.emissiveIntensity != null ? mp.emissiveIntensity : 0,
    transparent:       mp.transparent       != null ? mp.transparent       : false,
    opacity:           mp.opacity           != null ? mp.opacity           : 1,
  });
  const mesh = new THREE.Mesh(buildGeometry(od), mat);
  mesh.name = od.name || '';
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  // Support both array and object position/rotation/scale
  const pos = od.position;
  const rot = od.rotation;
  const scl = od.scale;
  if (Array.isArray(pos)) mesh.position.fromArray(pos);
  else if (pos) mesh.position.set(pos.x||0, pos.y||0, pos.z||0);
  if (Array.isArray(rot)) mesh.rotation.fromArray([...rot, 'XYZ']);
  else if (rot) mesh.rotation.set(rot.x||0, rot.y||0, rot.z||0);
  if (Array.isArray(scl)) mesh.scale.fromArray(scl);
  else if (scl) mesh.scale.set(scl.x||1, scl.y||1, scl.z||1);

  return mesh;
}

function clearUserObjects() {
  const toRemove = previewScene.children.filter(o => o !== grid && o !== floorMesh && !o.isLight);
  toRemove.forEach(o => {
    o.traverse(c => {
      if (c.isMesh) { c.geometry?.dispose(); c.material?.dispose(); }
    });
    previewScene.remove(o);
  });
}

function loadSceneData(sceneData) {
  clearUserObjects();
  const objects = sceneData?.objects;
  if (!objects?.length) {
    document.getElementById('object-info').textContent = '';
    return;
  }

  let triCount = 0;
  let objCount = 0;

  objects.forEach(od => {
    if ((od.type || 'mesh') === 'group') {
      const grp = new THREE.Group();
      grp.name = od.name || '';
      const pos = od.position; const rot = od.rotation; const scl = od.scale;
      if (Array.isArray(pos)) grp.position.fromArray(pos); else if (pos) grp.position.set(pos.x||0, pos.y||0, pos.z||0);
      if (Array.isArray(rot)) grp.rotation.fromArray([...rot,'XYZ']); else if (rot) grp.rotation.set(rot.x||0, rot.y||0, rot.z||0);
      if (Array.isArray(scl)) grp.scale.fromArray(scl); else if (scl) grp.scale.set(scl.x||1, scl.y||1, scl.z||1);
      (od.children || []).forEach(child => {
        const m = buildMesh(child);
        const attr = m.geometry?.attributes?.position;
        if (attr) triCount += m.geometry.index ? (m.geometry.index.count / 3 | 0) : (attr.count / 3 | 0);
        grp.add(m);
      });
      previewScene.add(grp);
      objCount++;
    } else {
      const m = buildMesh(od);
      const attr = m.geometry?.attributes?.position;
      if (attr) triCount += m.geometry.index ? (m.geometry.index.count / 3 | 0) : (attr.count / 3 | 0);
      previewScene.add(m);
      objCount++;
    }
  });

  document.getElementById('object-info').textContent = `${objCount} object${objCount !== 1 ? 's' : ''} · ${triCount.toLocaleString()} tris`;
}

// ── Viewport controls ──────────────────────────────────────────────────────────
function fitToScene() {
  const box = new THREE.Box3();
  previewScene.traverse(o => { if (o.isMesh && o !== floorMesh) box.expandByObject(o); });
  if (box.isEmpty()) return;
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist   = maxDim * 2.2;
  previewCam.position.set(center.x + dist * 0.55, center.y + dist * 0.55, center.z + dist * 0.9);
  controls.target.copy(center);
  controls.update();
}

function resetCamera() {
  previewCam.position.set(0.4, 0.35, 0.55);
  controls.target.set(0, 0.05, 0);
  controls.update();
}

function toggleWireframe() {
  wireframeMode = !wireframeMode;
  previewScene.traverse(o => {
    if (o.isMesh && o !== floorMesh) {
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach(m => { if (m) m.wireframe = wireframeMode; });
    }
  });
  document.getElementById('btn-wireframe').classList.toggle('active', wireframeMode);
}

function toggleGrid() {
  gridVisible = !gridVisible;
  grid.visible = gridVisible;
  document.getElementById('btn-grid').classList.toggle('active', !gridVisible);
}

// ── Thumbnail capture ──────────────────────────────────────────────────────────
function captureThumbnail(versionId) {
  fitToScene();
  controls.update();
  previewRenderer.render(previewScene, previewCam);
  thumbnails.set(versionId, previewRenderer.domElement.toDataURL('image/jpeg', 0.75));
  renderVersionList();
}

// ── GLB Export ─────────────────────────────────────────────────────────────────
function doExport(sceneData, filename) {
  loadSceneData(sceneData);
  const exporter = new GLTFExporter();
  exporter.parse(
    previewScene,
    result => {
      const url = URL.createObjectURL(new Blob([result], { type: 'model/gltf-binary' }));
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      addLog('info', `Exported ${filename}`);
    },
    err => addLog('error', 'Export failed: ' + err),
    { binary: true }
  );
}

function exportCurrentAsGLB() {
  if (!selectedVersionId) { addLog('info', 'Select a version first'); return; }
  const sd = sceneDataCache.get(selectedVersionId);
  if (!sd) { addLog('info', 'Scene data not loaded yet — click a version card first'); return; }
  const v = versionsCache.find(v => v.id === selectedVersionId);
  doExport(sd, `dio_v${v ? v.version : selectedVersionId.slice(0, 6)}.glb`);
}

function exportVersionById(id) {
  const v = versionsCache.find(v => v.id === id);
  const sd = sceneDataCache.get(id);
  if (sd) {
    doExport(sd, `dio_v${v ? v.version : id.slice(0, 6)}.glb`);
  } else {
    // Request it, then export on arrival
    selectedVersionId = id;
    wsSend({ type: 'load_version', version_id: id });
    addLog('info', `Loading v${v ? v.version : '?'} for export…`);
  }
}

// ── Relative time ──────────────────────────────────────────────────────────────
function formatRelTime(isoStr) {
  if (!isoStr) return '';
  const diff = Math.floor((Date.now() - new Date(isoStr + 'Z').getTime()) / 1000);
  if (diff < 5)     return 'just now';
  if (diff < 60)    return `${diff}s ago`;
  if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

// ── Version list rendering ─────────────────────────────────────────────────────
function renderVersionList() {
  const list = document.getElementById('version-list');
  const countEl = document.getElementById('version-count');
  const n = versionsCache.length;
  countEl.textContent = `${n} version${n !== 1 ? 's' : ''}`;

  if (n === 0) {
    list.innerHTML = '<div class="version-empty">No versions yet.<br>Speak a command in AR<br>to create one.</div>';
    return;
  }

  const sorted = [...versionsCache].reverse();
  list.innerHTML = '';

  sorted.forEach(v => {
    const thumb = thumbnails.get(v.id);
    const isSelected = v.id === selectedVersionId;
    const isFail = v.success === false;

    const card = document.createElement('div');
    card.className = 'version-card' + (isSelected ? ' selected' : '');
    card.dataset.id = v.id;

    card.innerHTML = `
      <div class="version-thumb">
        ${thumb
          ? `<img src="${esc(thumb)}" alt="v${v.version}">`
          : `<span class="no-thumb">&#9672;</span>`}
      </div>
      <div class="version-meta">
        <div class="version-top">
          <span class="version-num">v${v.version}</span>
          <span class="version-dot${isFail ? ' fail' : ''}"></span>
          <span class="version-age" title="${esc(v.timestamp || '')}">${formatRelTime(v.timestamp)}</span>
        </div>
        <div class="version-cmd">${esc(v.command || '\u2014')}</div>
      </div>
      <div class="version-actions">
        <button class="version-export-btn" data-id="${esc(v.id)}">&#x2193; Export GLB</button>
      </div>`;

    card.addEventListener('click', e => {
      if (e.target.classList.contains('version-export-btn')) return;
      selectVersion(v.id);
    });
    card.querySelector('.version-export-btn').addEventListener('click', e => {
      e.stopPropagation();
      exportVersionById(v.id);
    });

    list.appendChild(card);
  });
}

function selectVersion(id) {
  selectedVersionId = id;
  document.querySelectorAll('.version-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.id === id)
  );

  if (sceneDataCache.has(id)) {
    loadSceneData(sceneDataCache.get(id));
    if (!thumbnails.has(id)) setTimeout(() => captureThumbnail(id), 50);
  } else {
    const v = versionsCache.find(v => v.id === id);
    wsSend({ type: 'load_version', version_id: id });
    addLog('info', `Loading v${v ? v.version : '?'}\u2026`);
  }
}

// ── Log strip ──────────────────────────────────────────────────────────────────
const MAX_LOG = 80;
function addLog(type, msg) {
  const list = document.getElementById('log-list');
  const now = new Date();
  const ts = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-ts">${ts}</span><span class="log-badge ${type}">${type}</span><span class="log-msg">${esc(msg)}</span>`;
  list.insertBefore(entry, list.firstChild);
  while (list.children.length > MAX_LOG) list.removeChild(list.lastChild);
}

// ── Utilities ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function pad(n) { return String(n).padStart(2, '0'); }

// ── WebSocket ──────────────────────────────────────────────────────────────────
function wsSend(obj) { if (ws?.readyState === 1) ws.send(JSON.stringify(obj)); }

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/dashboard`);

  ws.onopen = () => {
    addLog('info', 'Connected to hub');
    wsSend({ type: 'request_state' });
  };

  ws.onclose = () => {
    addLog('info', 'Disconnected \u2014 reconnecting\u2026');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {};

  ws.onmessage = ({ data }) => {
    if (data instanceof ArrayBuffer || data instanceof Blob) return;
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    switch (msg.type) {

      case 'versions': {
        versionsCache = msg.data || [];
        renderVersionList();
        // Auto-select newest if nothing selected yet
        if (!selectedVersionId && versionsCache.length > 0) {
          const newest = versionsCache[versionsCache.length - 1];
          selectedVersionId = newest.id;
          wsSend({ type: 'load_version', version_id: newest.id });
        }
        break;
      }

      case 'load_state': {
        if (msg.data) {
          if (selectedVersionId) sceneDataCache.set(selectedVersionId, msg.data);
          loadSceneData(msg.data);
          if (selectedVersionId && !thumbnails.has(selectedVersionId)) {
            setTimeout(() => captureThumbnail(selectedVersionId), 80);
          }
          renderVersionList();
        }
        break;
      }

      case 'command_log': {
        if (msg.command)  addLog('voice',    msg.command);
        if (msg.response) addLog(msg.response.startsWith('ERROR') ? 'error' : 'response', msg.response);
        break;
      }

      case 'connection_status': {
        document.getElementById('dot-ar').classList.toggle('on',   (msg.ar_clients || 0) > 0 || !!msg.ar_connected);
        document.getElementById('dot-ctrl').classList.toggle('on', !!msg.controller_connected);
        break;
      }
    }
  };
}

// ── Button wiring ──────────────────────────────────────────────────────────────
document.getElementById('btn-wireframe').addEventListener('click', toggleWireframe);
document.getElementById('btn-grid').addEventListener('click', toggleGrid);
document.getElementById('btn-fit').addEventListener('click', fitToScene);
document.getElementById('btn-reset').addEventListener('click', resetCamera);
document.getElementById('btn-export').addEventListener('click', exportCurrentAsGLB);

document.getElementById('btn-save').addEventListener('click', () => {
  wsSend({ type: 'save_session' });
  addLog('info', 'Session save requested');
});

document.getElementById('btn-load-trigger').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      wsSend({ type: 'load_session', data });
      addLog('info', `Session loaded: ${file.name}`);
    } catch {
      addLog('error', 'Invalid session file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch (e.key) {
    case 'w': case 'W': toggleWireframe(); break;
    case 'g': case 'G': toggleGrid();      break;
    case 'f': case 'F': fitToScene();      break;
    case 'r': case 'R': resetCamera();     break;
  }
});

// ── Init ───────────────────────────────────────────────────────────────────────
connectWS();
</script>
</body>
</html>
